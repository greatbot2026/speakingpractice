<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listen and Repeat by Capstone TOEFL</title>
    <!-- 外部样式库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制隐藏样式，防止网络卡顿导致界面不切换 */
        .hidden { display: none !important; }
        
        .pulse { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fdfaef; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 4px; }
        
        .tab-active { border-bottom: 2px solid #c084fc; color: #c084fc; font-weight: bold; }
        .tab-inactive { color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-800">

    <header class="bg-purple-300 p-4 shadow-sm text-center flex-shrink-0">
        <h1 class="text-lg font-bold tracking-wide text-gray-800">Listen and Repeat by Capstone TOEFL</h1>
        <div id="progress-text" class="text-sm mt-1 opacity-90 hidden text-gray-700">Question <span id="q-current">1</span> / 7</div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 overflow-hidden">
        
        <div id="intro-screen" class="text-center w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Listen & Repeat</h2>
            <p class="text-gray-500 mb-6 text-sm leading-relaxed">
                建议戴上耳机体验。<br>
                系统将播放句子，听到“滴”声后请立即复述。
            </p>
            
            <div class="mb-6 text-left">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="login-id">登录ID</label>
                <input type="text" id="login-id" placeholder="请输入你的用户名或学号" 
                    class="shadow appearance-none border rounded-xl w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-purple-300">
            </div>

            <button onclick="startTest()" class="w-full bg-purple-300 hover:bg-purple-400 active:bg-purple-500 text-white font-bold py-4 rounded-xl text-lg shadow transition-all">
                开始训练
            </button>
        </div>

        <div id="task-screen" class="hidden text-center w-full max-w-md flex flex-col items-center justify-center h-64">
            <div id="status-listen" class="hidden">
                <div class="w-20 h-20 mx-auto bg-purple-50 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-purple-300" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-purple-400">认真听...</h2>
            </div>

            <div id="status-pause" class="hidden">
                <h2 class="text-2xl font-bold text-gray-500">准备...</h2>
            </div>

            <div id="status-record" class="hidden flex flex-col items-center">
                <div class="w-24 h-24 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-4 pulse">
                    <div class="w-12 h-12 bg-red-500 rounded-full"></div>
                </div>
                <h2 class="text-2xl font-bold text-red-500 mb-2">开始复述</h2>
                <p class="text-5xl font-mono font-bold text-gray-800" id="timer-text">00:08</p>
            </div>

            <div id="status-save" class="hidden">
                <h2 class="text-xl font-bold text-gray-800">时间到</h2>
                <p class="text-gray-500 mt-2">正在保存...</p>
            </div>
        </div>

        <div id="congrats-screen" class="hidden text-center w-full max-w-md flex flex-col items-center justify-center">
            <h2 class="text-4xl font-extrabold text-purple-400 mb-2">Congratulations!</h2>
            <p class="text-gray-500 mb-8">你已完成所有复述训练</p>
            <button onclick="showEndScreen()" class="w-full bg-purple-300 hover:bg-purple-400 text-white font-bold py-3 rounded-xl text-lg shadow transition-all">
                查看成绩
            </button>
        </div>

        <div id="end-screen" class="hidden w-full max-w-md flex flex-col h-full max-h-[85vh]">
            <div class="text-center mb-4 flex-shrink-0">
                <h2 class="text-2xl font-bold text-purple-400 mb-2">训练完成！</h2>
                <p class="text-gray-600 text-sm">用户: <span id="display-user-id" class="font-bold text-gray-800"></span></p>
            </div>
            <div class="pt-4 flex-shrink-0">
                <button onclick="location.reload()" class="w-full bg-purple-300 hover:bg-purple-400 text-white font-bold py-3 rounded-xl text-lg shadow transition-all">
                    再练一次
                </button>
            </div>
        </div>
    </main>

    <script>
        // 配置你的音频文件名字（请确保你的仓库里真的有这几个文件）
        const questions = [
            { duration: 8, audioFile: "1.mp3" },
            { duration: 8, audioFile: "2.mp3" },
            { duration: 10, audioFile: "3.mp3" },
            { duration: 8, audioFile: "4.mp3" },
            { duration: 8, audioFile: "5.mp3" },
            { duration: 8, audioFile: "6.mp3" },
            { duration: 8, audioFile: "7.mp3" }
        ];

        const globalPlayer = new Audio();
        let currentQIndex = 0;
        let timerInterval;
        let loginId = "";

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {
                console.log("Beep failed", e);
            }
        }

        // 核心点击事件
        function startTest() {
            try {
                loginId = document.getElementById('login-id').value || "Guest";
                
                // 强制解锁苹果音频
                globalPlayer.src = questions<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[0]</a>.audioFile;
                globalPlayer.load();
                globalPlayer.play().then(() => {
                    globalPlayer.pause();
                }).catch(e => console.log("Unlock audio failed", e));
            } catch (error) {
                console.error("初始化报错：", error);
            }

            // 无论音频是否加载成功，必定切换 UI
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('task-screen').classList.remove('hidden');
            document.getElementById('progress-text').classList.remove('hidden');
            
            currentQIndex = 0;
            processQuestion();
        }

        function processQuestion() {
            if (currentQIndex >= questions.length) {
                showCongratsScreen();
                return;
            }

            document.getElementById('q-current').innerText = currentQIndex + 1;
            hideAllTaskStatus();
            document.getElementById('status-listen').classList.remove('hidden');

            const currentQ = questions[currentQIndex];
            globalPlayer.src = currentQ.audioFile;
            
            // 播放音频并捕获错误
            globalPlayer.play().catch(e => {
                alert("第 " + (currentQIndex + 1) + " 题音频播放失败，请检查文件是否存在：" + currentQ.audioFile);
                // 即使报错也强行进入下一步，防止卡死
                setTimeout(() => {
                    globalPlayer.onended();
                }, 2000);
            });

            globalPlayer.onended = function() {
                hideAllTaskStatus();
                document.getElementById('status-pause').classList.remove('hidden');
                
                setTimeout(() => {
                    playBeep();
                    startRecordingTimer(currentQ.duration);
                }, 1000);
            };
        }

        function startRecordingTimer(duration) {
            hideAllTaskStatus();
            document.getElementById('status-record').classList.remove('hidden');
            
            let timeLeft = duration;
            const timerText = document.getElementById('timer-text');
            timerText.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;

            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishRecording();
                }
            }, 1000);
        }

        function finishRecording() {
            hideAllTaskStatus();
            document.getElementById('status-save').classList.remove('hidden');
            
            setTimeout(() => {
                currentQIndex++;
                processQuestion();
            }, 1500);
        }

        function hideAllTaskStatus() {
            document.getElementById('status-listen').classList.add('hidden');
            document.getElementById('status-pause').classList.add('hidden');
            document.getElementById('status-record').classList.add('hidden');
            document.getElementById('status-save').classList.add('hidden');
        }

        function showCongratsScreen() {
            document.getElementById('progress-text').classList.add('hidden');
            document.getElementById('task-screen').classList.add('hidden');
            document.getElementById('congrats-screen').classList.remove('hidden');
        }

        function showEndScreen() {
            document.getElementById('congrats-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('display-user-id').innerText = loginId;
        }
    </script>
</body>
</html>
