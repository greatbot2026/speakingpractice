<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listen and Repeat by Capstone TOEFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .pulse { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans text-gray-800">

    <header class="bg-purple-300 p-4 shadow-sm text-center flex-shrink-0">
        <h1 class="text-lg font-bold tracking-wide text-gray-800">Listen and Repeat</h1>
        <div id="progress-text" class="text-sm mt-1 opacity-90 hidden text-gray-700">Question <span id="q-current">1</span> / 7</div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 overflow-hidden">
        
        <div id="intro-screen" class="text-center w-full max-w-md">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Listen & Repeat</h2>
            <p class="text-gray-500 mb-6 text-sm leading-relaxed">
                建议戴上耳机体验。<br>
                系统将播放句子，听到“滴”声后请立即复述。
            </p>
            <div class="mb-6 text-left">
                <label class="block text-gray-700 text-sm font-bold mb-2">登录ID</label>
                <input type="text" id="login-id" placeholder="请输入学号" class="shadow appearance-none border rounded-xl w-full py-3 px-4 text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-300">
            </div>
            <button onclick="startTest()" class="w-full bg-purple-300 hover:bg-purple-400 text-white font-bold py-4 rounded-xl text-lg shadow">
                开始训练
            </button>
        </div>

        <div id="task-screen" class="hidden text-center w-full max-w-md flex flex-col items-center justify-center h-64">
            <div id="status-listen" class="hidden">
                <h2 class="text-2xl font-bold text-purple-400">🎧 认真听...</h2>
            </div>
            <div id="status-pause" class="hidden">
                <h2 class="text-2xl font-bold text-gray-500">准备...</h2>
            </div>
            <div id="status-record" class="hidden flex flex-col items-center">
                <div class="w-24 h-24 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-4 pulse">
                    <div class="w-12 h-12 bg-red-500 rounded-full"></div>
                </div>
                <h2 class="text-2xl font-bold text-red-500 mb-2">开始复述</h2>
                <p class="text-5xl font-mono font-bold text-gray-800" id="timer-text">00:08</p>
            </div>
            <div id="status-save" class="hidden">
                <h2 class="text-xl font-bold text-gray-800">时间到，进入下一题...</h2>
            </div>
        </div>

        <div id="congrats-screen" class="hidden text-center w-full max-w-md">
            <h2 class="text-4xl font-extrabold text-purple-400 mb-2">Congratulations!</h2>
            <p class="text-gray-500 mb-8">训练完成</p>
            <button onclick="location.reload()" class="w-full bg-purple-300 text-white font-bold py-3 rounded-xl text-lg">再练一次</button>
        </div>
    </main>

    <script>
        const questions = [
            { duration: 8, audioFile: "1.mp3" },
            { duration: 8, audioFile: "2.mp3" },
            { duration: 10, audioFile: "3.mp3" },
            { duration: 8, audioFile: "4.mp3" },
            { duration: 8, audioFile: "5.mp3" },
            { duration: 8, audioFile: "6.mp3" },
            { duration: 8, audioFile: "7.mp3" }
        ];

        const globalPlayer = new Audio();
        let currentQIndex = 0;
        let timerInterval;

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch (e) {}
        }

        function startTest() {
            try {
                globalPlayer.src = questions<a href="" class="citation-link" target="_blank" style="vertical-align: super; font-size: 0.8em; margin-left: 3px;">[0]</a>.audioFile;
                globalPlayer.load();
                globalPlayer.play().then(function() {
                    globalPlayer.pause();
                }).catch(function(e) {});
            } catch (error) {}

            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('task-screen').classList.remove('hidden');
            document.getElementById('progress-text').classList.remove('hidden');
            
            currentQIndex = 0;
            processQuestion();
        }

        function processQuestion() {
            if (currentQIndex >= questions.length) {
                document.getElementById('task-screen').classList.add('hidden');
                document.getElementById('progress-text').classList.add('hidden');
                document.getElementById('congrats-screen').classList.remove('hidden');
                return;
            }

            document.getElementById('q-current').innerText = currentQIndex + 1;
            hideAll();
            document.getElementById('status-listen').classList.remove('hidden');

            const currentQ = questions[currentQIndex];
            globalPlayer.src = currentQ.audioFile;
            
            globalPlayer.play().catch(function(e) {
                setTimeout(function() { globalPlayer.onended(); }, 2000);
            });

            globalPlayer.onended = function() {
                hideAll();
                document.getElementById('status-pause').classList.remove('hidden');
                setTimeout(function() {
                    playBeep();
                    startTimer(currentQ.duration);
                }, 1000);
            };
        }

        function startTimer(duration) {
            hideAll();
            document.getElementById('status-record').classList.remove('hidden');
            let timeLeft = duration;
            const timerText = document.getElementById('timer-text');
            
            function updateText(val) {
                timerText.innerText = "00:" + (val < 10 ? "0" + val : val);
            }
            updateText(timeLeft);

            timerInterval = setInterval(function() {
                timeLeft--;
                updateText(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    hideAll();
                    document.getElementById('status-save').classList.remove('hidden');
                    setTimeout(function() {
                        currentQIndex++;
                        processQuestion();
                    }, 1500);
                }
            }, 1000);
        }

        function hideAll() {
            document.getElementById('status-listen').classList.add('hidden');
            document.getElementById('status-pause').classList.add('hidden');
            document.getElementById('status-record').classList.add('hidden');
            document.getElementById('status-save').classList.add('hidden');
        }
    </script>
</body>
</html>
